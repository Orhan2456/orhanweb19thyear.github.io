<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <!-- Bu etiket mobil uyumluluğun kalbidir -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Orhan WEB 19ThYear</title>
  <style>
    /* --- ECOSIA İLHAMLI SADE CSS --- */
    :root {
      --bg-color: #fcfcfc;
      --brand-green: #2b8a3e; /* Ecosia tarzı ferah yeşil */
      --brand-light: #e8f5e9;
      --text-main: #202124;
      --text-muted: #5f6368;
      --card-bg: #ffffff;
      --border-color: #dfe1e5;
      --shadow-soft: 0 1px 6px rgba(32, 33, 36, 0.15);
      --shadow-hover: 0 2px 12px rgba(32, 33, 36, 0.2);
      --transition: all 0.25s ease;
    }

    /* --- YENİ EKLENEN GECE MODU (DARK THEME) --- */
    [data-theme="dark"] {
      --bg-color: #1a1a1c;
      --brand-green: #40c057; 
      --brand-light: #2b3a2f;
      --text-main: #e8eaed;
      --text-muted: #9aa0a6;
      --card-bg: #2d2d30;
      --border-color: #4a4a4d;
      --shadow-soft: 0 1px 6px rgba(0, 0, 0, 0.4);
      --shadow-hover: 0 2px 12px rgba(0, 0, 0, 0.6);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      /* Temalar arası geçişin yumuşak olması için: */
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* --- ÜST MENÜ (9 NOKTA VE TEMA BUTONU) --- */
    .top-nav {
      position: absolute;
      top: 20px;
      right: 30px;
      z-index: 100;
      display: flex;
      align-items: center;
    }

    .apps-wrapper {
      position: relative;
    }

    .apps-btn {
      background: transparent;
      border: none;
      padding: 8px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .apps-btn:hover {
      background: rgba(128, 128, 128, 0.15);
    }

    .apps-btn svg {
      width: 24px;
      height: 24px;
      fill: var(--text-muted);
    }

    /* Uygulamalar Açılır Menüsü */
    .apps-menu {
      position: absolute;
      top: 50px;
      right: 0;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: var(--shadow-hover);
      padding: 15px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      width: 220px;
      border: 1px solid var(--border-color);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.2s ease;
    }

    .apps-menu.active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: var(--text-main);
      font-size: 0.85rem;
      padding: 12px 10px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .app-item:hover {
      background: var(--brand-light);
    }

    .app-item img {
      width: 36px;
      height: 36px;
      margin-bottom: 8px;
      object-fit: contain;
    }

    /* Ana Konteyner */
    .container {
      flex: 1;
      width: 100%;
      max-width: 800px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20vh;
      transition: margin-top 0.4s ease;
    }

    .container.active {
      margin-top: 5vh;
    }

    /* Özel Anlamlı Logo */
    .logo-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 35px;
      cursor: default;
    }

    .logo-icon {
      margin-bottom: 10px;
      animation: gentleSway 4s ease-in-out infinite;
    }

    @keyframes gentleSway {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }

    .logo-text {
      font-size: 3rem;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -1px;
      text-align: center;
    }

    .logo-text span {
      color: var(--brand-green);
    }

    .logo-subtext {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-top: 5px;
      font-style: italic;
    }

    /* Arama Alanı */
    .search-box {
      position: relative;
      width: 100%;
      max-width: 650px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    #searchInput {
      width: 100%;
      /* Mikrofon için sağdan padding artırıldı */
      padding: 16px 50px 16px 25px; 
      border-radius: 40px;
      border: 1px solid var(--border-color);
      outline: none;
      font-size: 1.15rem;
      background: var(--card-bg);
      color: var(--text-main);
      box-shadow: var(--shadow-soft);
      transition: var(--transition);
      -webkit-appearance: none; /* Safari için düzeltme */
    }

    #searchInput:hover {
      box-shadow: var(--shadow-hover);
    }

    #searchInput:focus {
      border-color: var(--brand-green);
      box-shadow: 0 0 0 2px rgba(43, 138, 62, 0.2);
    }

    #searchInput::placeholder {
      color: #9aa0a6;
    }

    /* --- YENİ EKLENEN MİKROFON BUTONU --- */
    .mic-btn {
      position: absolute;
      right: 15px;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .mic-btn svg {
      width: 22px;
      height: 22px;
      fill: var(--brand-green);
    }

    .mic-btn:hover {
      background: var(--brand-light);
    }

    .mic-btn.listening svg {
      fill: #ea4335;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    /* Buton Düzeni */
    .button-group {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 25px;
      width: 100%;
    }

    button {
      padding: 12px 28px;
      border-radius: 4px;
      border: 1px solid transparent;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      background: var(--card-bg); /* Buton rengini temaya uyumlu hale getirdim */
      color: var(--text-main);
      border: 1px solid var(--border-color);
    }

    button:hover {
      background: var(--border-color);
      box-shadow: 0 1px 1px rgba(0,0,0,0.1);
    }

    .btn-primary {
      background: var(--brand-green) !important;
      color: white !important;
      border-color: transparent !important;
    }

    .btn-primary:hover {
      background: #237032 !important;
    }

    /* Öneriler Listesi */
    #suggestions {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      margin-top: 5px;
      position: absolute;
      width: 100%;
      z-index: 10;
      box-shadow: var(--shadow-hover);
      overflow: hidden;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s ease;
    }

    #suggestions.active {
      opacity: 1;
      visibility: visible;
    }

    .suggestion-item {
      padding: 12px 25px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-main);
    }

    .suggestion-item:hover {
      background: var(--brand-light);
      color: var(--brand-green);
    }

    /* --- YENİ EKLENEN GEÇMİŞ (HISTORY) TASARIMI --- */
    .history-header {
      padding: 10px 25px;
      font-size: 0.85rem;
      color: var(--brand-green);
      font-weight: bold;
      border-bottom: 1px solid var(--border-color);
    }

    .clear-history {
      padding: 10px;
      text-align: center;
      color: #ea4335;
      font-size: 0.9rem;
      cursor: pointer;
      border-top: 1px solid var(--border-color);
      background: var(--card-bg);
    }

    .clear-history:hover {
      text-decoration: underline;
      background: rgba(234, 67, 53, 0.1);
    }

    /* Sonuç Kartları */
    #results {
      margin-top: 40px;
      width: 100%;
      text-align: left;
    }

    .info-box {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 25px;
      box-shadow: var(--shadow-soft);
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .info-box h2 {
      margin: 0 0 10px 0;
      font-size: 1.6rem;
      color: var(--brand-green);
    }

    .info-box img {
      width: 100%;
      max-width: 100%;
      border-radius: 8px;
      object-fit: cover;
    }

    .info-content p {
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 15px;
    }

    .result {
      background: var(--card-bg);
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: var(--transition);
    }

    .result:hover {
      border-color: var(--border-color);
      box-shadow: var(--shadow-soft);
    }

    .result p {
      color: var(--text-main);
      line-height: 1.5;
    }
    
    .result p span.searchmatch {
      font-weight: bold;
      color: var(--text-main);
    }

    .result a, .info-box a {
      color: var(--brand-green);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 8px;
      font-weight: 500;
      font-size: 15px;
    }

    .result a:hover, .info-box a:hover {
      text-decoration: underline;
    }

    /* Footer */
    footer {
      width: 100%;
      background: var(--card-bg);
      padding: 25px 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: auto;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      border-top: 1px solid var(--border-color);
    }

    footer .footer-links {
      display: flex;
      gap: 20px;
      margin-top: 10px;
    }

    footer a {
      color: var(--text-muted);
      text-decoration: none;
      transition: var(--transition);
    }
    
    footer a:hover {
      color: var(--brand-green);
    }

    /* =========================================
       MOBİL VE TABLET UYUMLULUĞU (RESPONSIVE) 
       ========================================= */
       
    @media (max-width: 768px) {
      .container { margin-top: 15vh; }
      .logo-text { font-size: 2.6rem; }
    }

    @media (min-width: 600px) {
      .info-box.has-image { grid-template-columns: 250px 1fr; }
      .button-group { width: auto; }
    }

    @media (max-width: 480px) {
      .top-nav { right: 15px; top: 15px; }
      .apps-menu { right: -10px; width: 200px; }
      .container { margin-top: 8vh; padding: 0 15px; }
      .logo-text { font-size: 2.2rem; }
      #searchInput { padding: 14px 45px 14px 20px; font-size: 16px; }
      .button-group { flex-direction: column; gap: 10px; }
      button { width: 100%; padding: 14px; }
      .info-box, .result { padding: 15px; }
      .info-box h2 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <!-- Sağ Üst: Tema Butonu ve 9 Nokta Uygulamalar Menüsü -->
  <div class="top-nav">
    
    <!-- YENİ: Tema Değiştirme Butonu -->
    <button class="apps-btn" id="themeBtn" title="Gece/Gündüz Modu" style="margin-right: 5px;">
      <svg id="themeIcon" viewBox="0 0 24 24">
        <!-- Ay İkonu -->
        <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
      </svg>
    </button>

    <div class="apps-wrapper">
      <button class="apps-btn" id="appsBtn" title="Uygulamalar">
        <svg focusable="false" viewBox="0 0 24 24">
          <path d="M6,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM16,6c0,1.1 0.9,2 2,2s2,-0.9 2,-2 -0.9,-2 -2,-2 -2,0.9 -2,2zM12,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2z"></path>
        </svg>
      </button>
      <div class="apps-menu" id="appsMenu">
        <!-- Gmail -->
        <a href="https://mail.google.com" target="_blank" class="app-item">
          <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Gmail_icon_%282020%29.svg" alt="Gmail">
          <span>Gmail</span>
        </a>
        <!-- YouTube -->
        <a href="https://www.youtube.com" target="_blank" class="app-item">
          <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" alt="YouTube">
          <span>YouTube</span>
        </a>
      </div>
    </div>
  </div>

  <div class="container" id="mainContainer">
    
    <div class="logo-wrapper">
      <svg class="logo-icon" width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="18" r="4" stroke="var(--brand-green)" stroke-width="2"/>
        <path d="M12 14C12 9 8 5 4 4C6 3.5 12 3.5 16 8C19 11 21 15 21 19C17 19 14 17 12 14Z" fill="var(--brand-green)" opacity="0.9"/>
      </svg>
      <div class="logo-text">Orhan <span>WEB</span></div>
      <div class="logo-subtext">İyilik için ara...</div>
    </div>

    <div class="search-box">
      <div class="input-wrapper">
        <input type="text" id="searchInput" placeholder="Wikipedia'da arayın..." autocomplete="off"/>
        
        <!-- YENİ: Sesli Arama (Mikrofon) Butonu -->
        <button class="mic-btn" id="micBtn" title="Sesli Arama Yap">
          <svg viewBox="0 0 24 24">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
        </button>

      </div>
      <div id="suggestions"></div>
    </div>
    
    <div class="button-group">
      <button class="btn-primary" onclick="search()" id="searchBtn">Ara</button>
      <button onclick="detailedSearch()" id="detailedSearchBtn">Detaylı Ara</button>
    </div>

    <div id="results"></div>
  </div>

  <footer>
    <div>Bir Orhan Nuri Günay Ürünüdür</div>
    <div class="footer-links">
      <a href="index.html">Başlangıç</a>
      <a href="gizli_sekme.html">Orhan WEB - Gizli Sekme</a>
      <p>Hızlı - Güvenli - Basit</p>
    </div>
  </footer>

  <script>
    // --- YENİ: TEMA KONTROLÜ ---
    const themeBtn = document.getElementById('themeBtn');
    
    // Sayfa yüklendiğinde hafızadaki temayı kontrol et
    if (localStorage.getItem('orhan_theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }

    themeBtn.addEventListener('click', () => {
      let currentTheme = document.documentElement.getAttribute('data-theme');
      if (currentTheme === 'dark') {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('orhan_theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('orhan_theme', 'dark');
      }
    });

    // --- TEMEL DEĞİŞKENLER ---
    const searchSound = new Audio("aramabildirimi.mp3");
    const searchInput = document.getElementById("searchInput");
    const suggestionsDiv = document.getElementById("suggestions");
    const mainContainer = document.getElementById("mainContainer");
    const appsBtn = document.getElementById("appsBtn");
    const appsMenu = document.getElementById("appsMenu");
    let debounceTimer;

    // 9 Nokta Menü Kontrolü
    appsBtn.addEventListener("click", function(e) {
      e.stopPropagation();
      appsMenu.classList.toggle("active");
    });

    // Dışarı Tıklama (Önerileri ve Menüyü Kapatma)
    document.addEventListener("click", function(e) {
      if (e.target !== searchInput && !suggestionsDiv.contains(e.target)) {
        suggestionsDiv.classList.remove("active");
      }
      if (!appsMenu.contains(e.target) && e.target !== appsBtn) {
        appsMenu.classList.remove("active");
      }
    });

    // --- YENİ: SESLİ ARAMA FONKSİYONU ---
    const micBtn = document.getElementById('micBtn');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.lang = 'tr-TR';
      
      micBtn.addEventListener('click', () => {
        recognition.start();
        micBtn.classList.add('listening');
        searchInput.placeholder = "Sizi dinliyorum...";
        searchInput.value = "";
      });

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        searchInput.value = transcript;
        search(); // Sesi algılar algılamaz otomatik arama yapar
      };

      recognition.onend = () => {
        micBtn.classList.remove('listening');
        searchInput.placeholder = "Wikipedia'da arayın...";
      };
    } else {
      micBtn.style.display = 'none'; // Tarayıcı desteklemiyorsa butonu gizle
    }

    // --- ARAMA ÇUBUĞU OLAYLARI (Geçmiş + Öneriler) ---
    searchInput.addEventListener("focus", () => {
      // Çubuk boşken tıklanırsa geçmişi göster
      if(searchInput.value.trim() === '') showHistory();
    });

    searchInput.addEventListener("keyup", function(e) {
      if (e.key === "Enter") {
        clearTimeout(debounceTimer);
        suggestionsDiv.classList.remove("active");
        search();
      } else {
        clearTimeout(debounceTimer);
        if(searchInput.value.trim() === '') {
          showHistory();
        } else {
          debounceTimer = setTimeout(() => {
            getSuggestions();
          }, 300);
        }
      }
    });

    // --- YENİ: HIZLI GEÇMİŞİ GÖSTERME FONKSİYONU ---
    function showHistory() {
      let data = JSON.parse(localStorage.getItem("searchData")) || [];
      if(data.length > 0) {
        let historyHtml = `<div class="history-header">Son Aramalar</div>`;
        data.reverse().slice(0, 5).forEach(item => {
          historyHtml += `
            <div class="suggestion-item" onclick="selectSuggestion('${item}')">
              <svg width="16" height="16" fill="var(--text-muted)" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
              ${item}
            </div>`;
        });
        historyHtml += `<div class="clear-history" onclick="clearHistory()">Geçmişi Temizle</div>`;
        suggestionsDiv.innerHTML = historyHtml;
        suggestionsDiv.classList.add("active");
      } else {
        suggestionsDiv.classList.remove("active");
      }
    }

    function clearHistory() {
      localStorage.removeItem("searchData");
      suggestionsDiv.classList.remove("active");
      searchInput.focus();
    }

    // NORMAL ARAMA FONKSİYONU (Özet ve İlk Sonuçlar)
    async function search() {
      const query = searchInput.value.trim();
      const resultsDiv = document.getElementById("results");
      const searchBtn = document.getElementById("searchBtn");

      if (!query) return;

      mainContainer.classList.add("active");
      searchSound.play().catch(() => {});

      searchBtn.innerText = "Aranıyor...";
      resultsDiv.innerHTML = `<div style="text-align: center; color: var(--text-muted); padding: 40px;"><p>Sonuçlar aranıyor...</p></div>`;
      suggestionsDiv.classList.remove("active");

      saveToHistory(query);

      try {
        const wikiRes = await fetch(`https://tr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
        const wikiData = await wikiRes.json();

        const ddgRes = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`);
        const ddgData = await ddgRes.json();

        resultsDiv.innerHTML = "";

        if (wikiData.extract && wikiData.title !== "Not found.") {
          const infoBox = document.createElement("div");
          const hasImage = wikiData.thumbnail ? "has-image" : "";
          infoBox.className = `info-box ${hasImage}`;
          
          let imgHTML = wikiData.thumbnail ? `<div><img src="${wikiData.thumbnail.source}" alt="${wikiData.title}" /></div>` : "";
          
          infoBox.innerHTML = `
            ${imgHTML}
            <div class="info-content">
              <h2>${wikiData.title}</h2>
              <p>${wikiData.extract}</p>
              <a href="${wikiData.content_urls.desktop.page}" target="_blank">Wikipedia'da oku →</a>
            </div>
          `;
          resultsDiv.appendChild(infoBox);
        }

        let foundLinks = false;
        if (ddgData.RelatedTopics && ddgData.RelatedTopics.length > 0) {
          ddgData.RelatedTopics.forEach(item => {
            if (item.Text && item.FirstURL) {
              foundLinks = true;
              const div = document.createElement("div");
              div.className = "result";
              div.innerHTML = `
                <p>${item.Text}</p>
                <a href="${item.FirstURL}" target="_blank">Siteye Git</a>
              `;
              resultsDiv.appendChild(div);
            }
          });
        } 
        
        if (!wikiData.extract && !foundLinks) {
          resultsDiv.innerHTML = `<div style="text-align: center; padding: 40px; border-radius: 8px; border: 1px solid var(--border-color);"><h3 style="color: var(--text-main); margin-bottom: 8px;">"${query}" için sonuç bulunamadı.</h3><p style="color: var(--text-muted);">Lütfen farklı kelimelerle tekrar deneyin.</p></div>`;
        }
      } catch (error) {
        resultsDiv.innerHTML = `<div style="text-align: center; padding: 40px; color: #d93025; background: #fce8e6; border-radius: 8px;"><h3>Bağlantı hatası oluştu.</h3><p>İnternet bağlantınızı kontrol edip tekrar deneyin.</p></div>`;
      } finally {
        searchBtn.innerText = "Ara";
      }
    }

    // DETAYLI ARAMA FONKSİYONU (Kendi sayfanızda çoklu Wikipedia bağlantısı)
    async function detailedSearch() {
      const query = searchInput.value.trim();
      const resultsDiv = document.getElementById("results");
      const detailedSearchBtn = document.getElementById("detailedSearchBtn");

      if (!query) {
        searchInput.focus();
        return;
      }
      
      mainContainer.classList.add("active");
      searchSound.play().catch(() => {});

      detailedSearchBtn.innerText = "Aranıyor...";
      resultsDiv.innerHTML = `<div style="text-align: center; color: var(--text-muted); padding: 40px;"><p>Detaylı Wikipedia sonuçları aranıyor...</p></div>`;
      suggestionsDiv.classList.remove("active");

      saveToHistory(query);

      try {
        const wikiSearchRes = await fetch(
          `https://tr.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&utf8=&format=json&origin=*`
        );
        const wikiSearchData = await wikiSearchRes.json();

        resultsDiv.innerHTML = "";

        if (wikiSearchData.query && wikiSearchData.query.search.length > 0) {
          const header = document.createElement("h3");
          header.style.color = "var(--brand-green)";
          header.style.marginBottom = "20px";
          header.style.borderBottom = "1px solid var(--border-color)";
          header.style.paddingBottom = "10px";
          header.innerText = `"${query}" ile ilgili Detaylı Arama Sonuçları:`;
          resultsDiv.appendChild(header);

          wikiSearchData.query.search.forEach(item => {
            const div = document.createElement("div");
            div.className = "result";
            div.innerHTML = `
              <h4 style="margin-bottom: 8px; color: var(--text-main); font-size: 1.2rem;">${item.title}</h4>
              <p style="font-size: 0.95rem; color: var(--text-muted); margin-bottom: 10px; line-height: 1.5;">${item.snippet}...</p>
              <a href="https://tr.wikipedia.org/wiki/${encodeURIComponent(item.title.replace(/ /g, '_'))}" target="_blank">
                Makaleyi Oku →
              </a>
            `;
            resultsDiv.appendChild(div);
          });
        } else {
          resultsDiv.innerHTML = `<div style="text-align: center; padding: 40px; border-radius: 8px; border: 1px solid var(--border-color);"><h3 style="color: var(--text-main); margin-bottom: 8px;">"${query}" için detaylı sonuç bulunamadı.</h3><p style="color: var(--text-muted);">Lütfen farklı kelimelerle tekrar deneyin.</p></div>`;
        }

      } catch (error) {
        resultsDiv.innerHTML = `<div style="text-align: center; padding: 40px; color: #d93025; background: #fce8e6; border-radius: 8px;"><h3>Bağlantı hatası oluştu.</h3><p>İnternet bağlantınızı kontrol edip tekrar deneyin.</p></div>`;
      } finally {
        detailedSearchBtn.innerText = "Detaylı Ara";
      }
    }

    // ÖNERİLER FONKSİYONU
    async function getSuggestions() {
      const query = searchInput.value.trim();

      if (query.length < 2) {
        suggestionsDiv.classList.remove("active");
        setTimeout(() => suggestionsDiv.innerHTML = "", 200);
        return;
      }

      try {
        const res = await fetch(
          `https://tr.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(query)}&limit=5&namespace=0&format=json&origin=*`
        );
        const data = await res.json();
        const suggestions = data[1];

        if (suggestions.length > 0) {
          suggestionsDiv.innerHTML = "";
          suggestions.forEach(item => {
            const div = document.createElement("div");
            div.className = "suggestion-item";
            div.innerHTML = `
              <svg width="16" height="16" fill="var(--text-muted)" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
              ${item}
            `;
            div.onclick = () => {
              selectSuggestion(item);
            };
            suggestionsDiv.appendChild(div);
          });
          suggestionsDiv.classList.add("active");
        } else {
          suggestionsDiv.classList.remove("active");
        }
      } catch (err) {
        console.error("Öneri hatası:", err);
      }
    }

    function selectSuggestion(item) {
      searchInput.value = item;
      suggestionsDiv.classList.remove("active");
      search();
    }

    // YENİ: GEÇMİŞİ KAYDETME MANTIĞI GÜNCELLENDİ (Aynı kelimeyi çift eklemez)
    function saveToHistory(val) {
      let data = JSON.parse(localStorage.getItem("searchData")) || [];
      // Aynı arama varsa, onu listeden çıkarıp en yeni olarak başa alır
      data = data.filter(item => item !== val);
      data.push(val);
      localStorage.setItem("searchData", JSON.stringify(data.slice(-10))); 
    }
  </script>
</body>
